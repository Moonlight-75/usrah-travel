[phases.setup]
nixPkgs = ['nodejs_22', 'php', 'phpPackages.composer']

[phases.install]
cmds = ['composer install --no-interaction --optimize-autoloader', 'npm ci']

[phases.build]
cmds = ['npm run build']

[phases.start]
cmd = 'php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT'
